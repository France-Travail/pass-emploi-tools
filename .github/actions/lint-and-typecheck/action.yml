name: 'Lint and Typecheck'
description: 'Setup Node.js, install dependencies, run lint and typecheck'

inputs:
  install-command:
    description: 'Command to install dependencies'
    required: false
    default: 'YARN_ENABLE_SCRIPTS=false yarn install --immutable'
  lint-command:
    description: 'Command to run lint'
    required: false
    default: 'yarn lint'
  build-command:
    description: 'Command to run build'
    required: false
    default: 'yarn build'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js and Yarn
      uses: France-Travail/pass-emploi-tools/.github/actions/setup-node-yarn@master
      with:
        install-command: ${{ inputs.install-command }}

    - name: Run lint
      run: ${{ inputs.lint-command }}
      shell: bash

    - name: Run build
      run: ${{ inputs.build-command }}
      shell: bash

    - name: Vérification que le build ne modifie pas de fichiers
      run: git diff --exit-code
      shell: bash
