input {
  http {
    port => "${PORT}"
    user => "${USER}"
    password => "${PASSWORD}"
    additional_codecs => { "application/json" => "plain" }
  }
}

filter {
  kv {
    source => "[url][path]"
    field_split => "&"
    trim_key => "/?"
    include_keys => ["appname", "hostname"]
  }

  if [appname] =~ /staging$/ {
    mutate { add_field => { "[@metadata][env]" => "staging" } }
  } else if [appname] =~ /prod$/ {
    mutate { add_field => { "[@metadata][env]" => "prod" } }
  } else {
    mutate { add_field => { "[@metadata][env]" => "${ENVIRONMENT}" } }
  }
  mutate { add_field => { "[service][environment]" => "%{[@metadata][env]}" } }

  if [message] =~ /^method=\S+\s+path=/ {
    mutate {
      add_field => { "[service][name]" => "%{appname}" }
      add_tag => ["router"]
      remove_field => ["headers", "host", "appname", "hostname", "http", "url", "user_agent", "@version"]
    }

    kv {
      source => "message"
      field_split => " "
      trim_value => "\""
      include_keys => [
        "method",
        "path",
        "host",
        "request_id",
        "container",
        "from",
        "protocol",
        "status",
        "duration",
        "bytes",
        "referer",
        "user_agent"
      ]
    }

    mutate {
      rename => {
        "method"     => "[http][request][method]"
        "path"       => "[url][path]"
        "host"       => "[url][domain]"
        "request_id" => "[http][request][id]"
        "container"  => "[service][node][name]"
        "from"       => "[client][ip]"
        "protocol"   => "[url][scheme]"
        "status"     => "[http][response][status_code]"
        "bytes"      => "[http][response][body][bytes]"
        "referer"    => "[http][request][referrer]"
        "user_agent" => "[user_agent][original]"
      }
      # on enlève le 's' (duration=0.002s → duration=0.002)
      gsub => ["duration", "s$", ""]
      convert => {
        "[http][response][status_code]" => "integer"
        "[http][response][body][bytes]" => "integer"
        "duration"                      => "float"
      }
    }

    # conversion en nanosecondes (format ECS event.duration)
    ruby {
      code => '
        duration = event.get("duration")
        if duration
          event.set("[event][duration]", (duration.to_f * 1_000_000_000).to_i)
          event.remove("duration")
        end
      '
    }

    mutate {
      remove_field => ["[event][original]"]
    }
  } else {
    mutate {
      remove_field => ["headers", "host"]
      add_field => {
        "[host][name]"      => "%{appname}"
        "[host][container]" => "%{hostname}"
      }
      remove_field => ["appname", "hostname"]
    }

    if [message] =~ /^\s*{/ {
      json {
        source => "message"
        target => "msg"
        skip_on_invalid_json => true
      }

      ruby {
        code => '
          value = event.get("[msg][event][result][error][message]")
          if value.is_a?(Hash) || value.is_a?(Array)
            event.set("[msg][event][result][error][message]", LogStash::Json.dump(value))
          end
        '
      }

      kv {
        source => "[msg][message]"
        field_split => ", "
      }
    }
  }
}

output {
  if "router" in [tags] {
    elasticsearch {
      hosts => "${ELASTICSEARCH_HOST}"
      user => "${ELASTICSEARCH_USER}"
      password => "${ELASTICSEARCH_PASSWORD}"
      index => "logs-router-%{[@metadata][env]}-default"
      action => "create"
    }
  } else {
    elasticsearch {
      hosts => "${ELASTICSEARCH_HOST}"
      user => "${ELASTICSEARCH_USER}"
      password => "${ELASTICSEARCH_PASSWORD}"
      index => "logs-%{[@metadata][env]}-default"
      action => "create"
    }
  }
}
