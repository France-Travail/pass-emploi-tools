input {
  http {
    port => "${PORT}"
    user => "${USER}"
    password => "${PASSWORD}"
  }
}

filter {
  grok {
    match => [ "[headers][request_path]", "%{URIPARAM:url}" ]
    remove_field => ["headers"]
  }

  kv {
    source => "[url][path]"
    field_split => "&"
    trim_key => "/?"
  }

  mutate {
    remove_field => ["host"] # ip du serveur logstash lui même
  }

  mutate {
    add_field => {
      "[host][name]" => "%{appname}"
      "[host][container]" => "%{hostname}"
    }
    remove_field => ["appname", "hostname"]
  }

  json {
    source => "message"
    target => "msg"
    skip_on_invalid_json => true
  }

  kv {
    source => "[msg][message]"
    field_split => ", "
  }

  if [message] =~ /^method=/ {
    kv {
      source => "message"
      field_split => " "
      trim_value => "\""
      exclude_keys => ["host"]
    }

    mutate {
      rename => { "user_agent" => "[user_agent][original]" }
      gsub => ["duration", "s$", ""]
    }

    mutate {
      convert => {
        "status"   => "integer"
        "duration" => "float"
        "bytes"    => "integer"
      }
    }
  }
}

output {
  elasticsearch {
    hosts => "${ELASTICSEARCH_HOST}"
    user => "${ELASTICSEARCH_USER}"
    password => "${ELASTICSEARCH_PASSWORD}"
    index => "logs-${ENVIRONMENT}-default"
    action => "create"
  }
}
