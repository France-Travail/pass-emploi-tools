input {
  http {
    port => "${PORT}"
    user => "${USER}"
    password => "${PASSWORD}"
    additional_codecs => { "application/json" => "plain" }
  }
}

filter {
  kv {
    source => "[url][path]"
    field_split => "&"
    trim_key => "/?"
    include_keys => ["appname", "hostname"]
  }

  if [appname] =~ /staging$/ {
    mutate { add_field => { "[@metadata][env]" => "staging" } }
  } else if [appname] =~ /prod$/ {
    mutate { add_field => { "[@metadata][env]" => "prod" } }
  } else {
    mutate { add_field => { "[@metadata][env]" => "${ENVIRONMENT}" } }
  }
  mutate { add_field => { "[service][environment]" => "%{[@metadata][env]}" } }

  # Drop de la pollution introduite par le drain HTTP Scalingo
  # (champs au top-level qui décrivent l'input HTTP, pas la requête applicative)
  # Commun aux deux branches. À faire AVANT les renames qui écrivent dans http.*/url.*/user_agent.*
  mutate {
    remove_field => ["headers", "host", "http", "url", "user_agent", "@version"]
  }

  # Identification ECS du service Scalingo (commun aux deux branches)
  # service.name      = nom logique de l'app (ex: "pass-emploi-api-staging")
  # service.node.name = identifiant unique de l'instance (ex: "web-1")
  mutate {
    add_field => {
      "[service][name]"       => "%{appname}"
      "[service][node][name]" => "%{hostname}"
    }
  }

  # Logs des routeurs Scalingo
  if [message] =~ /^method=\S+\s+path=/ {
    mutate {
      add_tag => ["router"]
    }

    kv {
      source => "message"
      field_split => " "
      trim_value => "\""
      include_keys => [
        "method",
        "path",
        "host",
        "request_id",
        "container",
        "from",
        "protocol",
        "status",
        "duration",
        "bytes",
        "referer",
        "user_agent"
      ]
    }

    # Drop des health checks infra Scalingo (router interne pinguant /).
    # Non paramétrable côté config Scalingo. On supprime ici pour ne pas
    # polluer logs-router-* avec des 404 systématiques.
    if [path] == "/" and [user_agent] == "scalingo-router/1.0" {
      drop {}
    }

    mutate {
      rename => {
        "method"     => "[http][request][method]"
        "path"       => "[url][path]"
        "host"       => "[url][domain]"
        "request_id" => "[http][request][id]"
        "container"  => "[service][node][name]"
        "from"       => "[client][ip]"
        "protocol"   => "[url][scheme]"
        "status"     => "[http][response][status_code]"
        "bytes"      => "[http][response][body][bytes]"
        "referer"    => "[http][request][referrer]"
        "user_agent" => "[user_agent][original]"
      }
      # on enlève le 's' (duration=0.002s → duration=0.002)
      gsub => ["duration", "s$", ""]
      convert => {
        "[http][response][status_code]" => "integer"
        "[http][response][body][bytes]" => "integer"
        "duration"                      => "float"
      }
    }

    # conversion en nanosecondes (format ECS event.duration)
    ruby {
      code => '
        duration = event.get("duration")
        if duration
          event.set("[event][duration]", (duration.to_f * 1_000_000_000).to_i)
          event.remove("duration")
        end
      '
    }

    # Reformat ECS : remplacer la ligne brute par event.action low-cardinality,
    # poser event.outcome dérivé du status_code (success < 400, failure >= 400).
    # Seuil aligné sur les logs app (pino-http) pour que event.outcome soit un
    # filtre transverse cohérent edge <-> app.
    mutate {
      update => { "message" => "request_routed" }
      add_field => { "[event][action]" => "request_routed" }
    }
    if [http][response][status_code] and [http][response][status_code] >= 400 {
      mutate { add_field => { "[event][outcome]" => "failure" } }
    } else {
      mutate { add_field => { "[event][outcome]" => "success" } }
    }

  # Logs applicatifs
  } else {
    # Lignes non-JSON du conteneur postdeploy : sortie d'outillage de
    # déploiement (yarn, warnings de dépréciation...), non structurée.
    if [hostname] =~ /^postdeploy/ and [message] !~ /^\s*{/ {
      drop {}
    }

    if [message] =~ /^\s*{/ {
      json {
        source => "message"
        target => "msg"
        skip_on_invalid_json => true
      }

      # Drop des health checks infra Scalingo (router interne pinguant /).
      # Côté app, pino-http logge un request_completed sur 404 → bruit dans
      # logs-staging-default. Symétrique au drop côté branche router.
      if [msg][req][url] == "/" and [msg][req][headers][user-agent] == "scalingo-router/1.0" {
        drop {}
      }

      # Drop du bruit de bootstrap NestJS (RouterExplorer "Mapped route", etc.).
      # Logs de démarrage non-ECS, rejoués via pino à chaque (re)déploiement
      # (bufferLogs court-circuite le filtre logger:['error','warn'] de main.ts).
      if [msg][context] in ["RouterExplorer", "RoutesResolver", "InstanceLoader", "NestFactory", "NestApplication"] {
        drop {}
      }

      # Bloc 1 : renames communs + champs pino-http auto (msg.req/res posés
      # par pino-http sur tous les logs émis pendant une requête HTTP, y
      # compris les logs applicatifs).
      mutate {
        rename => {
          "[msg][trace.id]"                 => "[trace][id]"
          "[msg][transaction.id]"           => "[transaction][id]"
          "[msg][user][id]"                 => "[user][id]"
          "[msg][user][type]"               => "[user][type]"
          "[msg][user][structure]"          => "[user][structure]"
          "[msg][req][method]"              => "[http][request][method]"
          "[msg][req][id]"                  => "[http][request][id]"
          "[msg][req][url]"                 => "[url][path]"
          "[msg][req][headers][user-agent]" => "[user_agent][original]"
          "[msg][req][headers][x-real-ip]"  => "[client][ip]"
          "[msg][res][statusCode]"          => "[http][response][status_code]"
          "[msg][pid]"                      => "[process][pid]"
          "[msg][level]"                    => "[log][level]"
          "[msg][msg]"                      => "[message]"
          "[msg][event][action]"            => "[event][action]"
          "[msg][event][outcome]"           => "[event][outcome]"
          "[msg][err][type]"                => "[error][type]"
          "[msg][err][message]"             => "[error][message]"
          "[msg][err][stack]"               => "[error][stack_trace]"
          "[msg][context]"                  => "[log][logger]"
        }
        remove_field => ["[msg][user]"]
      }

      # Bloc 2 : renames spécifiques aux logs applicatifs structurés
      # (external_api_call, etc.). Exécuté APRÈS le bloc 1 → écrase
      # http.request.method / url.path / http.response.status_code par les
      # valeurs de l'appel sortant lorsque les champs applicatifs sont posés.
      # Sur un log pino-http nominal, ces sources n'existent pas → no-op.
      mutate {
        rename => {
          "[msg][event][duration]"               => "[event][duration]"
          "[msg][http][request][id]"             => "[http][request][id]"
          "[msg][http][request][method]"         => "[http][request][method]"
          "[msg][http][request][body][content]"  => "[http][request][body][content]"
          "[msg][http][response][status_code]"   => "[http][response][status_code]"
          "[msg][http][response][body][content]" => "[http][response][body][content]"
          "[msg][url][path]"                     => "[url][path]"
          "[msg][url][domain]"                   => "[url][domain]"
          "[msg][labels]"                        => "[labels]"
          "[msg][error]"                         => "[error]"
        }
      }

      # Reformat des logs d'exception NestJS (ExceptionsHandler).
      # Aujourd'hui sur une 500 NestJS émet un log avec message = Error.message brut
      # (high cardinality, inexploitable en agrégation). On force le type d'événement
      # ECS, et on ajoute event.action/outcome que ce code path NestJS ne produit pas.
      if [log][logger] == "ExceptionsHandler" {
        mutate {
          update => { "message" => "request_failed" }
          add_field => {
            "[event][action]"  => "request_failed"
            "[event][outcome]" => "failure"
          }
        }
      } else if ![log][logger] {
        # Log pino-http nominal (sans log.logger applicatif) sur erreur :
        # la stack capturée est celle du middleware pino-http (onResFinished
        # interne), pas du code applicatif. La vraie stack métier est dans
        # le log ExceptionsHandler corrélé via trace.id. On drop pour ne pas
        # polluer.
        mutate {
          remove_field => ["[error][stack_trace]"]
        }
      }

      # responseTime (ms) → event.duration (ns), aligné format ECS comme la branche router
      ruby {
        code => '
          rt = event.get("[msg][responseTime]")
          if rt
            event.set("[event][duration]", (rt.to_f * 1_000_000).to_i)
            event.remove("[msg][responseTime]")
          end
        '
      }

      ruby {
        code => '
          value = event.get("[msg][event][result][error][message]")
          if value.is_a?(Hash) || value.is_a?(Array)
            event.set("[msg][event][result][error][message]", LogStash::Json.dump(value))
          end
        '
      }

      kv {
        source => "[msg][message]"
        field_split => ", "
      }
    }
  }

  # Cleanup final commun à toutes les sources
  mutate {
    remove_field => [
      "appname",
      "hostname",
      "[event][original]",
      "[msg][hostname]",
      "[msg][time]",         # déjà dans @timestamp
      "[msg][res]",          # coquille vide après rename de statusCode
      "[msg][req][headers]", # vide après whitelist côté app (cf REQ_HEADERS_WHITELIST)
      "[msg][req][query]",   # déjà dans url.path, cardinalité élevée et PII potentielle
      "[msg][req]",          # coquille vide après cleanup ci-dessus + rename method/id/url
      "[msg][err]",          # coquille vide après rename type/message/stack
      "[msg][event]",        # coquille vide après rename action/outcome/duration
      "[msg][http]",         # coquille vide après renames externalApiCall
      "[msg][url]"           # coquille vide après renames externalApiCall
    ]
  }
}

output {
  if "router" in [tags] {
    elasticsearch {
      hosts => "${ELASTICSEARCH_HOST}"
      user => "${ELASTICSEARCH_USER}"
      password => "${ELASTICSEARCH_PASSWORD}"
      index => "logs-router-%{[@metadata][env]}-default"
      action => "create"
    }
  } else {
    elasticsearch {
      hosts => "${ELASTICSEARCH_HOST}"
      user => "${ELASTICSEARCH_USER}"
      password => "${ELASTICSEARCH_PASSWORD}"
      index => "logs-%{[@metadata][env]}-default"
      action => "create"
    }
  }
}
